<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff7aa8" />
    <meta name="description" content="Una piccola app offline per disegnare nel browser." />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <title>Vicky Draw</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Vicky Draw</h1>
          <p id="saveStatus">Pronta per disegnare</p>
        </div>
        <button class="ghost-button" id="installButton" type="button" hidden>Installa</button>
      </header>

      <main class="drawing-stage" id="drawingStage" aria-label="Area di disegno">
        <div class="board" id="board">
          <canvas id="drawingCanvas"></canvas>
          <div class="sticker-layer" id="stickerLayer" aria-label="Sticker sul disegno"></div>
        </div>
      </main>

      <nav class="toolbar" aria-label="Strumenti">
        <div class="tool-group">
          <button class="tool-button is-active" id="brushButton" type="button" aria-pressed="true">Penna</button>
          <button class="tool-button" id="eraserButton" type="button" aria-pressed="false">Gomma</button>
          <button class="tool-button" id="handButton" type="button" aria-pressed="false">Sposta</button>
        </div>

        <label class="color-control" aria-label="Colore">
          <input id="colorPicker" type="color" value="#4738ff" />
        </label>

        <label class="size-control">
          <span>Tratto</span>
          <input id="sizePicker" type="range" min="2" max="44" value="12" />
        </label>

        <div class="tool-group">
          <button class="tool-button" id="assetsButton" type="button">Sticker/Sfondi</button>
        </div>

        <div class="tool-group zoom-controls" aria-label="Zoom">
          <button class="icon-button" id="zoomOutButton" type="button" title="Zoom out" aria-label="Zoom out">−</button>
          <button class="tool-button zoom-label" id="zoomResetButton" type="button" title="Reimposta zoom">100%</button>
          <button class="icon-button" id="zoomInButton" type="button" title="Zoom in" aria-label="Zoom in">+</button>
        </div>

        <div class="tool-group">
          <button class="icon-button" id="undoButton" type="button" title="Annulla" aria-label="Annulla">↶</button>
          <button class="icon-button" id="redoButton" type="button" title="Ripristina" aria-label="Ripristina">↷</button>
        </div>

        <div class="tool-group">
          <button class="tool-button" id="saveButton" type="button">Salva</button>
          <button class="tool-button" id="galleryButton" type="button">Galleria</button>
          <button class="tool-button" id="exportButton" type="button">PNG</button>
          <button class="danger-button" id="clearButton" type="button">Pulisci</button>
        </div>
      </nav>
    </div>

    <dialog id="assetsDialog" class="asset-dialog">
      <form method="dialog" class="dialog-header">
        <h2>Sticker e sfondi</h2>
        <button class="icon-button" type="submit" aria-label="Chiudi">×</button>
      </form>
      <div class="asset-panel-body">
        <div class="asset-tabs" role="tablist" aria-label="Tipo elemento">
          <button class="tool-button is-active" id="stickersTab" type="button" role="tab" aria-selected="true">Sticker</button>
          <button class="tool-button" id="backgroundsTab" type="button" role="tab" aria-selected="false">Sfondi</button>
        </div>
        <label class="search-control">
          <span>Cerca</span>
          <input id="assetSearch" type="search" placeholder="es. cuore, gatto, cielo, calcio..." autocomplete="off" />
        </label>
        <div id="assetGrid" class="asset-grid"></div>
        <p id="emptyAssets" class="empty-state" hidden>Nessun elemento trovato.</p>
      </div>
    </dialog>

    <dialog id="galleryDialog" class="gallery-dialog">
      <form method="dialog" class="dialog-header">
        <h2>Galleria</h2>
        <button class="icon-button" type="submit" aria-label="Chiudi">×</button>
      </form>
      <div id="galleryGrid" class="gallery-grid"></div>
      <p id="emptyGallery" class="empty-state">Non ci sono ancora disegni salvati.</p>
    </dialog>

    <script src="app.js" type="module"></script>
  </body>
</html>
